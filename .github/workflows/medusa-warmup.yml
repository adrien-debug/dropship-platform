name: Medusa warm-up

# Railway free tier sleeps the Medusa container after a few minutes of
# inactivity. The first hit then takes 8-10s, which kills the storefront
# UX. We ping /health every ~5 minutes to keep it warm.
#
# GitHub Actions cron has a minimum granularity of 5 min and is best-effort
# on free runners (occasional skips around peak hours). That's plenty.

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Hit Medusa /health
        run: |
          set -eu
          for i in 1 2 3; do
            code=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 30 \
              "https://medusa-production-656a.up.railway.app/health" \
              || echo 000)
            echo "attempt $i -> HTTP $code"
            if [ "$code" = "200" ]; then exit 0; fi
            sleep 5
          done
          echo "Medusa did not return 200 after 3 attempts" >&2
          exit 1
